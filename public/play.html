
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🔒 Operation: Unlock the OP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body { font-family: 'Inter', sans-serif; background: #000; color: #fff; min-height: 100vh; min-height: -webkit-fill-available; }

  .screen { display: none; min-height: 100vh; padding: 24px; }
  .screen.active { display: flex; flex-direction: column; }

  /* JOIN */
  #joinScreen { align-items: center; justify-content: center; gap: 28px; position: relative; overflow: hidden; }
  #joinScreen::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(0,255,136,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 85% 15%, rgba(0,170,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse 50% 40% at 15% 85%, rgba(255,0,128,0.06) 0%, transparent 50%);
    animation: glow 12s ease-in-out infinite alternate;
  }
  @keyframes glow { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

  .join-logo { font-size: 3.5em; z-index: 1; }
  .join-title { font-size: 1.6em; font-weight: 900; z-index: 1; text-align: center; background: linear-gradient(135deg, #00ff88, #00aaff, #ff0080); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .join-sub { color: rgba(255,255,255,0.3); font-size: 0.85em; z-index: 1; letter-spacing: 2px; text-transform: uppercase; }

  .join-form { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 16px; z-index: 1; }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-group label { font-size: 0.75em; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
  .input-group input, .input-group select { padding: 16px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; color: #fff; font-size: 1.05em; font-family: 'Inter', sans-serif; outline: none; transition: all 0.3s; }
  .input-group input:focus, .input-group select:focus { border-color: #00ff88; box-shadow: 0 0 20px rgba(0,255,136,0.15); }
  .input-group select option { background: #111; }

  .join-btn { padding: 18px; background: linear-gradient(135deg, #00ff88, #00aaff); color: #000; border: none; border-radius: 14px; font-size: 1.1em; font-weight: 900; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s; margin-top: 8px; }
  .join-btn:active { transform: scale(0.97); }

  /* WAIT */
  #waitScreen { align-items: center; justify-content: center; gap: 20px; text-align: center; }
  .wait-icon { font-size: 3.5em; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.7; } }
  .wait-team { font-size: 1.2em; font-weight: 800; background: linear-gradient(135deg, #00ff88, #00aaff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .wait-msg { color: rgba(255,255,255,0.4); font-size: 1em; }

  /* PUZZLE */
  #puzzleScreen { gap: 0; padding: 0; }
  .puzzle-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.06); }
  .puzzle-num { font-size: 0.85em; font-weight: 700; color: #00aaff; }
  .puzzle-progress { display: flex; gap: 5px; }
  .prog-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.08); transition: all 0.3s; }
  .prog-dot.done { background: #00ff88; box-shadow: 0 0 6px rgba(0,255,136,0.4); }
  .prog-dot.active { background: #00aaff; animation: dotP 1s infinite; }
  @keyframes dotP { 0%,100% { box-shadow: 0 0 3px rgba(0,170,255,0.2); } 50% { box-shadow: 0 0 10px rgba(0,170,255,0.5); } }

  /* Fragment bar */
  .fragment-bar { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: rgba(0,255,136,0.04); border-bottom: 1px solid rgba(0,255,136,0.1); font-size: 0.8em; }
  .fragment-bar .label { color: rgba(255,255,255,0.4); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .fragment-item { padding: 3px 10px; background: rgba(0,255,136,0.15); border-radius: 6px; color: #00ff88; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.95em; }
  .fragment-item.empty { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2); }

  .puzzle-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
  .puzzle-title { font-size: 1.15em; font-weight: 800; background: linear-gradient(135deg, #00ff88, #00aaff, #ff0080); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 10px; }
  .puzzle-story { color: rgba(255,255,255,0.55); line-height: 1.6; font-size: 0.9em; padding: 14px; background: rgba(255,255,255,0.02); border-left: 3px solid rgba(0,170,255,0.4); border-radius: 0 10px 10px 0; }
  .puzzle-content { padding: 18px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; }

  .cipher-text { font-family: 'JetBrains Mono', monospace; font-size: 1.4em; text-align: center; padding: 18px; background: rgba(0,0,0,0.4); border-radius: 10px; letter-spacing: 6px; color: #ffd700; }
  .scramble-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 10px; }
  .scramble-word { padding: 10px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; font-family: 'JetBrains Mono', monospace; font-size: 0.95em; font-weight: 700; color: #ff6b6b; }
  .order-item { padding: 12px 16px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; font-size: 0.95em; margin: 4px 0; }
  .clue-box { padding: 12px 14px; background: rgba(255,215,0,0.05); border: 1px dashed rgba(255,215,0,0.2); border-radius: 10px; color: #ffd700; font-size: 0.85em; font-style: italic; line-height: 1.5; }
  .reveal-text { padding: 12px 14px; background: rgba(0,255,136,0.06); border: 1px solid rgba(0,255,136,0.15); border-radius: 10px; color: #00ff88; font-size: 0.85em; font-style: italic; display: none; }

  /* Answer */
  .answer-area { padding: 16px 20px; background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.06); }
  .answer-row { display: flex; gap: 10px; }
  .answer-input { flex: 1; padding: 16px 18px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 14px; color: #fff; font-size: 1.05em; font-family: 'JetBrains Mono', monospace; outline: none; transition: all 0.3s; }
  .answer-input:focus { border-color: #00aaff; box-shadow: 0 0 15px rgba(0,170,255,0.15); }
  .answer-input.wrong { border-color: #ff4444; animation: inputShake 0.5s; }
  .answer-input.correct { border-color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.2); }
  @keyframes inputShake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }

  .submit-btn { padding: 16px 24px; background: linear-gradient(135deg, #00aaff, #0088cc); color: #fff; border: none; border-radius: 14px; font-size: 1.05em; font-weight: 800; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
  .submit-btn:active { transform: scale(0.95); }

  .hint-btn { display: block; margin-top: 10px; padding: 10px; background: none; border: 1px solid rgba(255,215,0,0.15); color: rgba(255,215,0,0.6); border-radius: 10px; cursor: pointer; font-size: 0.8em; width: 100%; transition: all 0.3s; }
  .hint-btn:active { background: rgba(255,215,0,0.08); }
  .hint-text { display: none; margin-top: 10px; padding: 12px; background: rgba(255,215,0,0.05); border: 1px solid rgba(255,215,0,0.12); border-radius: 10px; color: #ffd700; font-size: 0.85em; line-height: 1.5; }
  .hint-text.visible { display: block; }

  /* VICTORY */
  #victoryScreen { align-items: center; justify-content: center; gap: 20px; text-align: center; position: relative; overflow: hidden; }
  #victoryScreen::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 50%, rgba(0,255,136,0.12) 0%, transparent 60%); }
  .victory-emoji { font-size: 5em; z-index: 1; animation: vBounce 1s infinite; }
  @keyframes vBounce { 0%,100% { transform: scale(1); } 25% { transform: scale(1.1) rotate(-5deg); } 75% { transform: scale(1.1) rotate(5deg); } }
  .victory-title { font-size: 2em; font-weight: 900; z-index: 1; background: linear-gradient(135deg, #ffd700, #ff8800); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .victory-sub { font-size: 1.1em; z-index: 1; color: rgba(255,255,255,0.7); }
  .victory-time { font-size: 1.5em; font-weight: 900; z-index: 1; background: linear-gradient(135deg, #00ff88, #00aaff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .victory-msg { color: rgba(255,255,255,0.4); font-size: 0.95em; max-width: 320px; z-index: 1; line-height: 1.5; }
</style>
</head>
<body>

<div class="screen active" id="joinScreen">
  <div class="join-logo">🔒</div>
  <div class="join-title">Operation: Unlock the OP</div>
  <div class="join-sub">SPS FP&A Edition</div>
  <div class="join-form">
    <div class="input-group">
      <label>Your Name</label>
      <input type="text" id="playerName" placeholder="Enter your name" autocomplete="off">
    </div>
    <div class="input-group">
      <label>Team</label>
      <select id="teamSelect">
        <option value="">— Pick a team —</option>
        <option value="⚡ The P&L Avengers">⚡ The P&L Avengers</option>
        <option value="🏴‍☠️ Pivot Table Pirates">🏴‍☠️ Pivot Table Pirates</option>
        <option value="🚀 The OP1 Survivors">🚀 The OP1 Survivors</option>
        <option value="💰 The Frugality Five">💰 The Frugality Five</option>
        <option value="🎯 Variance Hunters">🎯 Variance Hunters</option>
      </select>
    </div>
    <button class="join-btn" onclick="joinGame()">Enter the Mission</button>
  </div>
</div>

<div class="screen" id="waitScreen">
  <div class="wait-icon">🔒</div>
  <div class="wait-team" id="waitTeamName"></div>
  <div class="wait-msg">Standing by for mission launch...</div>
</div>

<div class="screen" id="puzzleScreen">
  <div class="puzzle-header">
    <div class="puzzle-num" id="puzzleNum">CLUE 1 / 9</div>
    <div class="puzzle-progress" id="puzzleProgress"></div>
  </div>
  <div class="fragment-bar" id="fragmentBar">
    <div class="label">🔑 Fragments:</div>
    <div id="fragmentList"></div>
  </div>
  <div class="puzzle-body" id="puzzleBody"></div>
  <div class="answer-area">
    <div class="answer-row">
      <input type="text" class="answer-input" id="answerInput" placeholder="Your answer..." autocomplete="off">
      <button class="submit-btn" onclick="submitAnswer()">GO</button>
    </div>
    <button class="hint-btn" onclick="requestHint()">💡 Need a hint?</button>
    <div class="hint-text" id="hintText"></div>
  </div>
</div>

<div class="screen" id="victoryScreen">
  <div class="victory-emoji">🔓</div>
  <div class="victory-title">OP SUBMITTED!</div>
  <div class="victory-sub">The document is restored.</div>
  <div class="victory-time" id="victoryTime">00:00</div>
  <div class="victory-msg">Your team cracked all the clues and saved the business review. Well done. 🕵️</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let currentPuzzle = 1, teamName = '', totalPuzzles = 9;

  const fragments = { 1:'W', 2:'S', 3:'V', 4:'2', 5:'1', 6:'C', 7:'K', 8:'14' };
  let collectedFragments = [];

  const puzzles = {
    1: { icon: '🧠', title: 'The Weekly Ritual',
      story: 'The system is waking up. Answer this to begin decryption.',
      content: `<div style="font-size:1.05em;line-height:1.8;color:rgba(255,255,255,0.7);padding:10px;"><em>"Every week I carry the story of the business. Leaders read me in silence before they speak. No presenter required. What am I?"</em></div>`,
      placeholder: 'Enter the acronym', fragment: 'W' },
    2: { icon: '🔐', title: 'The Encoded Message',
      story: 'A coded message has been intercepted. Crack it to reveal who we serve.',
      content: `<div class="cipher-text">19 · 5 · 12 · 12 · 5 · 18</div>`,
      placeholder: 'Enter the decoded word', fragment: 'S' },
    3: { icon: '📊', title: 'Hero or Villain',
      story: 'This concept can make you a hero or ruin your Monday.',
      content: `<div style="font-size:1.05em;line-height:1.8;color:rgba(255,255,255,0.7);padding:10px;"><em>"I am the difference between what you planned and what actually happened. I can make you a hero or ruin your Monday. Who am I?"</em></div>`,
      placeholder: 'Enter the answer', fragment: 'V' },
    4: { icon: '📅', title: 'Twice a Year',
      story: 'Finance dreads me, leadership demands me.',
      content: `<div style="font-size:1.05em;line-height:1.8;color:rgba(255,255,255,0.7);padding:10px;"><em>"I come twice a year. I'm not a holiday. Finance dreads me, leadership demands me. I get longer every cycle. What am I?"</em></div>`,
      placeholder: 'Enter the answer (2 letters)', fragment: '2' },
    5: { icon: '🧮', title: 'Seller Math',
      story: 'A seller\'s listings need analysis. Do the math.',
      content: `<div style="font-family:'JetBrains Mono',monospace;font-size:1em;padding:14px;background:rgba(0,0,0,0.3);border-radius:10px;line-height:2;">📋 A seller lists <strong>200</strong> products<br>📌 <strong>25%</strong> are suppressed for compliance<br>📌 Of the remaining active listings, <strong>10%</strong> go out of stock<br><br><span style="color:#ffd700;">❓ How many listings are live and available?</span></div>`,
      placeholder: 'Enter the number', fragment: '1' },
    6: { icon: '🔀', title: 'The Scramble',
      story: 'Two of these scrambled words form a famous Leadership Principle. Three are decoys.',
      content: `<div class="scramble-grid"><div class="scramble-word">NOITAVONI</div><div class="scramble-word">SNOSIOBSE</div><div class="scramble-word">REVILED</div><div class="scramble-word">MERTOCUTS</div><div class="scramble-word">TNVENI</div></div>`,
      placeholder: 'Enter the Leadership Principle', fragment: 'C' },
    7: { icon: '🚦', title: 'Green Red Yellow',
      story: 'A lateral thinking challenge.',
      content: `<div style="font-size:1.05em;line-height:1.8;color:rgba(255,255,255,0.7);padding:10px;"><em>"I am green when life is good, red when it isn't, and yellow when nobody wants to make a decision. I'm a three-letter acronym. What am I?"</em></div>`,
      placeholder: 'Enter the 3-letter acronym', fragment: 'K' },
    8: { icon: '📋', title: 'The LP Order',
      story: 'Put these Leadership Principles in the correct order as they appear on the official Amazon list.',
      content: `<div style="display:flex;flex-direction:column;gap:8px;"><div class="order-item">🔹 Deliver Results</div><div class="order-item">🔹 Customer Obsession</div><div class="order-item">🔹 Are Right, A Lot</div><div class="order-item">🔹 Think Big</div></div>`,
      placeholder: 'Enter all four in order', fragment: '14' },
    9: { icon: '🔓', title: 'Final Assembly',
      story: 'You have all the fragments. Assemble the unlock code to submit the OP.',
      content: `<div style="text-align:center;padding:20px;"><div style="font-size:1.3em;font-weight:700;margin-bottom:15px;color:#ffd700;">🔑 Your collected fragments:</div><div id="finalFragments" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;"></div><div style="color:rgba(255,255,255,0.5);font-size:0.9em;">Combine all fragments in order — no spaces, no dashes.<br>Enter the complete unlock code.</div></div>`,
      placeholder: 'Enter the unlock code' }
  };

  const saved = sessionStorage.getItem('escapeRoom');
  if (saved) {
    const { name, team } = JSON.parse(saved);
    teamName = team;
    socket.emit('joinTeam', { teamName: team, playerName: name });
    showScreen('waitScreen');
    document.getElementById('waitTeamName').textContent = team;
  }

  function joinGame() {
    const name = document.getElementById('playerName').value.trim();
    const team = document.getElementById('teamSelect').value;
    if (!name) { alert('Please enter your name!'); return; }
    if (!team) { alert('Please pick a team!'); return; }
    teamName = team;
    sessionStorage.setItem('escapeRoom', JSON.stringify({ name, team }));
    socket.emit('joinTeam', { teamName: team, playerName: name });
    showScreen('waitScreen');
    document.getElementById('waitTeamName').textContent = team;
  }

  socket.on('gameStarted', () => { currentPuzzle = 1; collectedFragments = []; showScreen('puzzleScreen'); renderPuzzle(currentPuzzle); });

  socket.on('gameState', (data) => {
    if (data.started) {
      currentPuzzle = data.team.currentPuzzle;
      // Rebuild collected fragments
      collectedFragments = [];
      for (let i = 1; i < currentPuzzle && i <= 8; i++) {
        if (fragments[i]) collectedFragments.push(fragments[i]);
      }
      if (data.team.finished) showScreen('victoryScreen');
      else { showScreen('puzzleScreen'); renderPuzzle(currentPuzzle); }
    }
  });

  const revealTexts = {
    1: 'The document is beginning to decrypt. Fragment collected: W',
    2: 'Decoded. Fragment collected: S',
    3: 'Correct. First letter of the answer. Fragment collected: V',
    4: 'I come twice a year. Fragment collected: 2',
    5: 'Correct. First digit of the answer. Fragment collected: 1',
    6: 'Customer Obsession is LP #1. Fragment collected: C',
    7: 'First letter of the answer. Fragment collected: K',
    8: 'Deliver Results sits at position 14. Fragment collected: 14',
    9: 'Code accepted. The OP is submitted!'
  };

  socket.on('puzzleResult', (data) => {
    const input = document.getElementById('answerInput');
    if (data.correct) {
      input.classList.remove('wrong'); input.classList.add('correct');
      // Collect fragment
      if (fragments[data.puzzleNumber] && !collectedFragments.includes(fragments[data.puzzleNumber])) {
        collectedFragments.push(fragments[data.puzzleNumber]);
      }
      // Show reveal text
      const hint = document.getElementById('hintText');
      hint.textContent = `✅ ${revealTexts[data.puzzleNumber] || 'Correct!'}`;
      hint.classList.add('visible');
      hint.style.background = 'rgba(0,255,136,0.08)';
      hint.style.borderColor = 'rgba(0,255,136,0.2)';
      hint.style.color = '#00ff88';

      if (data.finished) {
        document.getElementById('victoryTime').textContent = fmtTime(data.finishTime);
        setTimeout(() => showScreen('victoryScreen'), 1500);
      } else {
        currentPuzzle = data.nextPuzzle;
        setTimeout(() => { input.classList.remove('correct'); input.value = ''; renderPuzzle(currentPuzzle); }, 1500);
      }
    } else { input.classList.add('wrong'); setTimeout(() => input.classList.remove('wrong'), 600); }
  });

  socket.on('hintReceived', (data) => {
    const h = document.getElementById('hintText');
    h.textContent = `💡 ${data.hint}`; h.classList.add('visible');
  });

  socket.on('gameReset', () => { currentPuzzle = 1; teamName = ''; collectedFragments = []; sessionStorage.removeItem('escapeRoom'); showScreen('joinScreen'); });

  function renderPuzzle(num) {
    const p = puzzles[num]; if (!p) return;
    document.getElementById('puzzleNum').textContent = `CLUE ${num} / ${totalPuzzles}`;
    const prog = document.getElementById('puzzleProgress'); prog.innerHTML = '';
    for (let i = 1; i <= totalPuzzles; i++) {
      const d = document.createElement('div'); d.className = 'prog-dot';
      if (i < num) d.classList.add('done'); else if (i === num) d.classList.add('active');
      prog.appendChild(d);
    }
    // Update fragment bar
    const fl = document.getElementById('fragmentList'); fl.innerHTML = '';
    for (let i = 1; i <= 8; i++) {
      const f = document.createElement('span');
      if (collectedFragments.includes(fragments[i])) {
        f.className = 'fragment-item'; f.textContent = fragments[i];
      } else {
        f.className = 'fragment-item empty'; f.textContent = '?';
      }
      fl.appendChild(f);
    }
    document.getElementById('puzzleBody').innerHTML = `
      <div class="puzzle-title">${p.icon} ${p.title}</div>
      <div class="puzzle-story">${p.story}</div>
      <div class="puzzle-content">${p.content}</div>`;
    // For clue 9, show collected fragments
    if (num === 9) {
      const ff = document.getElementById('finalFragments');
      if (ff) {
        ff.innerHTML = '';
        collectedFragments.forEach(f => {
          const el = document.createElement('span');
          el.className = 'fragment-item'; el.textContent = f;
          el.style.fontSize = '1.2em'; el.style.padding = '6px 14px';
          ff.appendChild(el);
        });
      }
    }
    const input = document.getElementById('answerInput');
    input.value = ''; input.placeholder = p.placeholder;
    input.classList.remove('wrong','correct');
    document.getElementById('hintText').classList.remove('visible');
    document.getElementById('hintText').textContent = '';
    setTimeout(() => input.focus(), 100);
  }

  function submitAnswer() {
    const a = document.getElementById('answerInput').value.trim();
    if (a) socket.emit('submitAnswer', { puzzleNumber: currentPuzzle, answer: a });
  }

  function requestHint() { socket.emit('requestHint', { puzzleNumber: currentPuzzle }); }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      if (document.getElementById('joinScreen').classList.contains('active')) joinGame();
      else submitAnswer();
    }
  });

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function fmtTime(ms) {
    const s = Math.floor(ms/1000), m = Math.floor(s/60);
    return `${m}m ${s%60}s`;
  }
</script>
</body>
</html>
