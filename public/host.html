

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏦 Finance Escape Room — Host Screen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    height: 100vh;
    overflow: hidden;
  }

  /* Ambient background */
  .ambient-bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, rgba(0,255,136,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 85% 15%, rgba(0,170,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse 50% 40% at 15% 85%, rgba(255,0,128,0.06) 0%, transparent 50%);
    animation: bgShift 12s ease-in-out infinite alternate;
  }
  @keyframes bgShift { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

  .container {
    position: relative; z-index: 1;
    height: 100vh; display: flex; flex-direction: column;
    padding: 25px 50px;
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .header .brand {
    display: flex; align-items: center; gap: 15px;
  }

  .header .brand h1 {
    font-size: 1.6em; font-weight: 900;
    background: linear-gradient(135deg, #00ff88, #00aaff, #ff0080);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-size: 200% 200%; animation: grad 8s ease infinite;
  }
  @keyframes grad { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

  .header .brand .tag {
    font-size: 0.7em; color: rgba(255,255,255,0.3);
    letter-spacing: 3px; text-transform: uppercase;
  }

  .timer-area { display: flex; align-items: center; gap: 12px; }

  .timer {
    font-family: 'Inter', sans-serif; font-size: 2.2em; font-weight: 900;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(135deg, #00ff88, #00aaff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .timer.warning { background: linear-gradient(135deg, #ffaa00, #ff8800); -webkit-background-clip: text; }
  .timer.danger { background: linear-gradient(135deg, #ff4444, #ff0000); -webkit-background-clip: text; animation: timerPulse 0.5s infinite; }
  @keyframes timerPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* Lobby */
  .lobby {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 40px;
  }

  .lobby-header { text-align: center; }

  .lobby-header h2 {
    font-size: clamp(2.5em, 5vw, 4em); font-weight: 900;
    background: linear-gradient(135deg, #00ff88, #00aaff, #ff0080);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: fadeIn 1s ease;
  }

  .lobby-header .counter {
    font-size: 1.2em; color: rgba(255,255,255,0.4); margin-top: 10px;
  }
  .lobby-header .counter b {
    font-size: 1.3em; font-weight: 900;
    background: linear-gradient(135deg, #00ff88, #00aaff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .lobby-teams {
    display: flex; flex-wrap: wrap; gap: 16px;
    justify-content: center; max-width: 1000px;
  }

  .lobby-team-card {
    padding: 20px 30px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px; text-align: center;
    min-width: 170px; animation: fadeUp 0.5s ease;
    transition: all 0.3s;
  }
  .lobby-team-card:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); }

  .lobby-team-card .team-name { font-weight: 800; font-size: 1.1em; margin-bottom: 6px; }
  .lobby-team-card .player-count { color: rgba(255,255,255,0.35); font-size: 0.85em; }
  .lobby-team-card .player-names { color: rgba(255,255,255,0.2); font-size: 0.75em; margin-top: 4px; }

  .start-btn {
    font-size: 1.3em; padding: 20px 70px;
    background: linear-gradient(135deg, #00ff88, #00aaff);
    color: #000; border: none; border-radius: 60px;
    cursor: pointer; font-weight: 900; letter-spacing: 3px;
    text-transform: uppercase; transition: all 0.4s;
    box-shadow: 0 0 40px rgba(0,255,136,0.2);
  }
  .start-btn:hover { transform: scale(1.05); box-shadow: 0 0 60px rgba(0,255,136,0.35); }
  .start-btn:disabled { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.2); box-shadow: none; cursor: not-allowed; }

  /* Race */
  .race-container { flex: 1; display: none; flex-direction: column; gap: 10px; padding: 15px 0; overflow-y: auto; }
  .race-container.active { display: flex; }

  .team-track {
    display: flex; align-items: center; gap: 20px; padding: 16px 24px;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
    border-radius: 16px; transition: all 0.5s;
  }
  .team-track.finished { border-color: rgba(0,255,136,0.3); background: rgba(0,255,136,0.03); }
  .team-track.first-place { border-color: rgba(255,215,0,0.4); background: rgba(255,215,0,0.05); box-shadow: 0 0 40px rgba(255,215,0,0.1); }

  .team-rank {
    font-size: 2em; font-weight: 900; min-width: 55px; text-align: center;
    background: linear-gradient(135deg, #00ff88, #00aaff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .team-rank.gold { background: linear-gradient(135deg, #ffd700, #ffaa00); -webkit-background-clip: text; }
  .team-rank.silver { background: linear-gradient(135deg, #c0c0c0, #999); -webkit-background-clip: text; }
  .team-rank.bronze { background: linear-gradient(135deg, #cd7f32, #a0522d); -webkit-background-clip: text; }

  .team-info { min-width: 200px; }
  .team-info .name { font-size: 1.2em; font-weight: 800; }
  .team-info .players { font-size: 0.75em; color: rgba(255,255,255,0.3); margin-top: 3px; }

  .progress-track { flex: 1; height: 36px; background: rgba(255,255,255,0.04); border-radius: 18px; overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 18px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 12px; min-width: 36px;
  }
  .progress-fill .runner { font-size: 1.3em; }

  .puzzle-dots { display: flex; gap: 6px; align-items: center; }
  .puzzle-dot {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7em; font-weight: 700; transition: all 0.3s;
  }
  .puzzle-dot.solved { background: #00ff88; color: #000; box-shadow: 0 0 8px rgba(0,255,136,0.4); }
  .puzzle-dot.current { background: rgba(0,170,255,0.2); border: 2px solid #00aaff; color: #00aaff; animation: dotPulse 1s infinite; }
  .puzzle-dot.locked { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2); }
  @keyframes dotPulse { 0%,100% { box-shadow: 0 0 4px rgba(0,170,255,0.2); } 50% { box-shadow: 0 0 12px rgba(0,170,255,0.5); } }

  .team-stats { text-align: right; min-width: 130px; }
  .team-stats .puzzle-status { font-size: 1em; font-weight: 700; }
  .team-stats .time { font-size: 1.1em; font-weight: 900; background: linear-gradient(135deg, #00ff88, #00aaff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .team-stats .hints { font-size: 0.8em; color: rgba(255,255,255,0.3); margin-top: 2px; }

  /* Winner */
  .winner-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.9); z-index: 100;
    justify-content: center; align-items: center; flex-direction: column;
  }
  .winner-overlay.active { display: flex; }
  .winner-overlay .trophy { font-size: 8em; animation: trophyBounce 1s ease infinite; }
  @keyframes trophyBounce { 0%,100% { transform: scale(1) rotate(-5deg); } 50% { transform: scale(1.1) rotate(5deg); } }
  .winner-overlay h2 {
    font-size: clamp(2em, 5vw, 4em); font-weight: 900; margin: 20px 0;
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .winner-overlay .win-time { font-size: 1.5em; color: rgba(255,255,255,0.6); }
  .winner-overlay .close-btn {
    margin-top: 30px; padding: 14px 50px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    color: #fff; border-radius: 30px; cursor: pointer; font-size: 1em;
    transition: all 0.3s;
  }
  .winner-overlay .close-btn:hover { background: rgba(255,255,255,0.1); }

  .confetti-piece { position: fixed; z-index: 101; animation: confettiFall linear forwards; }
  @keyframes confettiFall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

  .controls { display: flex; justify-content: center; gap: 15px; padding: 12px 0; }
  .ctrl-btn {
    padding: 10px 28px; border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.5);
    border-radius: 10px; cursor: pointer; font-size: 0.85em; transition: all 0.3s;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .ctrl-btn.danger { border-color: rgba(255,68,68,0.2); color: rgba(255,68,68,0.6); }
  .ctrl-btn.danger:hover { border-color: rgba(255,68,68,0.4); color: #ff4444; }

  .team-color-0 { --tc: #00ff88; } .team-color-1 { --tc: #00aaff; } .team-color-2 { --tc: #ff6b6b; }
  .team-color-3 { --tc: #ffd700; } .team-color-4 { --tc: #ff00ff; } .team-color-5 { --tc: #ff8800; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="ambient-bg"></div>
<div class="container">
  <div class="header">
    <div class="brand">
      <h1>🏦 Finance Escape Room</h1>
      <div class="tag">SPS FP&A Edition</div>
    </div>
    <div class="timer-area" id="timerBar" style="display:none;">
      <div class="timer" id="timer">00:00</div>
    </div>
  </div>

  <div class="lobby" id="lobby">
    <div class="lobby-header">
      <h2>Waiting for Players</h2>
      <div class="counter">
        <b id="teamCount">0</b> teams · <b id="playerCount">0</b> players
      </div>
    </div>
    <div class="lobby-teams" id="lobbyTeams"></div>
    <button class="start-btn" id="startBtn" disabled onclick="startGame()">Start Escape</button>
  </div>

  <div class="race-container" id="raceContainer">
    <div id="teamTracks"></div>
  </div>

  <div class="controls" id="controls" style="display:none;">
    <button class="ctrl-btn danger" onclick="resetGame()">Reset Game</button>
  </div>
</div>

<div class="winner-overlay" id="winnerOverlay">
  <div class="trophy">🏆</div>
  <h2 id="winnerName">Team Name</h2>
  <div class="win-time" id="winnerTime">Escaped in 0:00</div>
  <button class="close-btn" onclick="closeWinner()">Continue Watching</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let gameStarted = false;
  let startTime = null;
  let timerInterval = null;

  socket.on('teamsUpdate', (teams) => { updateLobby(teams); updateRaceTrack(teams); });

  socket.on('gameStarted', (data) => {
    gameStarted = true; startTime = data.startTime;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('raceContainer').classList.add('active');
    document.getElementById('timerBar').style.display = 'flex';
    document.getElementById('controls').style.display = 'flex';
    startTimer();
  });

  socket.on('firstFinisher', (data) => { showWinner(data.teamName, data.time); });

  socket.on('gameReset', () => {
    gameStarted = false; startTime = null; clearInterval(timerInterval);
    document.getElementById('lobby').style.display = 'flex';
    document.getElementById('raceContainer').classList.remove('active');
    document.getElementById('timerBar').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    document.getElementById('winnerOverlay').classList.remove('active');
    document.getElementById('teamTracks').innerHTML = '';
    document.getElementById('lobbyTeams').innerHTML = '';
    document.getElementById('teamCount').textContent = '0';
    document.getElementById('playerCount').textContent = '0';
    document.getElementById('startBtn').disabled = true;
  });

  function updateLobby(teams) {
    if (gameStarted) return;
    const container = document.getElementById('lobbyTeams');
    container.innerHTML = '';
    let totalPlayers = 0;
    teams.forEach((team, i) => {
      totalPlayers += team.playerCount;
      const card = document.createElement('div');
      card.className = `lobby-team-card team-color-${i % 6}`;
      card.style.borderColor = `var(--tc)`;
      card.innerHTML = `
        <div class="team-name" style="color: var(--tc)">${esc(team.name)}</div>
        <div class="player-count">${team.playerCount} player${team.playerCount !== 1 ? 's' : ''}</div>
        <div class="player-names">${team.players.map(p => esc(p)).join(', ')}</div>
      `;
      container.appendChild(card);
    });
    document.getElementById('teamCount').textContent = teams.length;
    document.getElementById('playerCount').textContent = totalPlayers;
    document.getElementById('startBtn').disabled = teams.length < 2;
    // Update lobby header
    document.querySelector('.lobby-header h2').textContent = teams.length > 0 ? 'Teams Ready' : 'Waiting for Players';
  }

  function updateRaceTrack(teams) {
    if (!gameStarted) return;
    const container = document.getElementById('teamTracks');
    container.innerHTML = '';
    const colors = ['#00ff88','#00aaff','#ff6b6b','#ffd700','#ff00ff','#ff8800'];
    const emojis = ['🚀','⚡','🔥','💎','🌟','🎯'];
    teams.forEach((team, i) => {
      const progress = (team.solvedCount / team.totalPuzzles) * 100;
      const color = colors[i % 6];
      const emoji = emojis[i % 6];
      let rankClass = '';
      if (i === 0) rankClass = 'gold'; else if (i === 1) rankClass = 'silver'; else if (i === 2) rankClass = 'bronze';
      const track = document.createElement('div');
      track.className = `team-track ${team.finished ? 'finished' : ''} ${i === 0 && team.finished ? 'first-place' : ''}`;
      let dots = '';
      for (let p = 1; p <= team.totalPuzzles; p++) {
        let dc = 'locked';
        if (team.solvedCount >= p) dc = 'solved'; else if (team.currentPuzzle === p) dc = 'current';
        dots += `<div class="puzzle-dot ${dc}">${team.solvedCount >= p ? '✓' : p}</div>`;
      }
      track.innerHTML = `
        <div class="team-rank ${rankClass}">#${i+1}</div>
        <div class="team-info">
          <div class="name" style="color:${color}">${esc(team.name)}</div>
          <div class="players">${team.players.map(p => esc(p)).join(', ')}</div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
          <div class="progress-track">
            <div class="progress-fill" style="width:${Math.max(5,progress)}%;background:linear-gradient(90deg,${color}33,${color});">
              <span class="runner">${team.finished ? '🏆' : emoji}</span>
            </div>
          </div>
          <div class="puzzle-dots">${dots}</div>
        </div>
        <div class="team-stats">
          ${team.finished
            ? `<div class="time">${fmt(team.finishTime)}</div>`
            : `<div class="puzzle-status" style="color:${color}">Puzzle ${team.currentPuzzle}/${team.totalPuzzles}</div>`}
          <div class="hints">${team.hintsUsed > 0 ? `💡 ${team.hintsUsed} hints` : ''}</div>
        </div>`;
      container.appendChild(track);
    });
  }

  function startTimer() {
    const el = document.getElementById('timer');
    timerInterval = setInterval(() => {
      const ms = Date.now() - startTime;
      el.textContent = fmt(ms);
      el.className = 'timer';
      if (ms/1000 > 600) el.classList.add('danger');
      else if (ms/1000 > 300) el.classList.add('warning');
    }, 100);
  }

  function fmt(ms) {
    const s = Math.floor(ms/1000), m = Math.floor(s/60);
    return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }

  function startGame() { socket.emit('startGame'); }
  function resetGame() { if (confirm('Reset game? All progress will be lost.')) socket.emit('resetGame'); }

  function showWinner(name, time) {
    document.getElementById('winnerName').textContent = `${name} ESCAPED!`;
    document.getElementById('winnerTime').textContent = `Escaped in ${fmt(time)}`;
    document.getElementById('winnerOverlay').classList.add('active');
    launchConfetti();
  }

  function closeWinner() { document.getElementById('winnerOverlay').classList.remove('active'); }

  function launchConfetti() {
    const c = ['#00ff88','#00aaff','#ff0080','#ffd700','#ff6b6b','#ff00ff'];
    for (let i = 0; i < 120; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.cssText = `left:${Math.random()*100}%;width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;background:${c[Math.floor(Math.random()*c.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s;`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5000);
      }, i * 25);
    }
  }

  function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
</script>
</body>
</html>
