
Purpose: Print host.html content for easy copying

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏦 Finance Escape Room — Host Screen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a1a;
    color: #fff;
    min-height: 100vh;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
      radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(0, 170, 255, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 50% 80%, rgba(255, 0, 128, 0.06) 0%, transparent 50%);
    z-index: 0;
    animation: bgPulse 8s ease-in-out infinite alternate;
  }

  @keyframes bgPulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

  .container {
    position: relative; z-index: 1; padding: 20px 40px;
    height: 100vh; display: flex; flex-direction: column;
  }

  .header { text-align: center; padding: 15px 0; position: relative; }

  .header h1 {
    font-family: 'Orbitron', monospace; font-size: 2.8em; font-weight: 900;
    background: linear-gradient(135deg, #00ff88, #00aaff, #ff0080);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 3px; animation: titleGlow 3s ease-in-out infinite alternate;
  }

  @keyframes titleGlow { 0% { filter: brightness(1); } 100% { filter: brightness(1.3); } }

  .header .subtitle {
    font-size: 1.1em; color: rgba(255,255,255,0.5); margin-top: 5px;
    letter-spacing: 5px; text-transform: uppercase;
  }

  .timer-bar { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; }

  .timer {
    font-family: 'Orbitron', monospace; font-size: 2.5em; font-weight: 700;
    color: #00ff88; text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
  }

  .timer.warning { color: #ffaa00; text-shadow: 0 0 20px rgba(255, 170, 0, 0.5); }
  .timer.danger { color: #ff4444; text-shadow: 0 0 20px rgba(255, 68, 68, 0.5); animation: timerPulse 0.5s infinite; }

  @keyframes timerPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  .lobby {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 30px;
  }

  .lobby .join-info {
    text-align: center; padding: 30px 50px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; backdrop-filter: blur(10px);
  }

  .lobby .join-info h2 { font-size: 1.8em; margin-bottom: 15px; color: #00aaff; }

  .lobby .join-url {
    font-family: 'Orbitron', monospace; font-size: 2em; color: #00ff88;
    padding: 15px 30px; background: rgba(0, 255, 136, 0.1);
    border: 2px solid rgba(0, 255, 136, 0.3); border-radius: 12px; margin: 10px 0;
  }

  .lobby .team-count { font-size: 1.3em; color: rgba(255,255,255,0.7); margin-top: 15px; }
  .lobby .team-count span { color: #00ff88; font-weight: 700; font-size: 1.4em; }

  .start-btn {
    font-family: 'Orbitron', monospace; font-size: 1.5em; padding: 18px 60px;
    background: linear-gradient(135deg, #00ff88, #00cc6a); color: #0a0a1a;
    border: none; border-radius: 50px; cursor: pointer; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; transition: all 0.3s;
    box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
  }

  .start-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(0, 255, 136, 0.5); }
  .start-btn:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }

  .lobby-teams { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; max-width: 900px; }

  .lobby-team-card {
    padding: 15px 25px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 12px;
    text-align: center; min-width: 150px; animation: fadeInUp 0.5s ease;
  }

  .lobby-team-card .team-name { font-weight: 700; font-size: 1.2em; margin-bottom: 5px; }
  .lobby-team-card .player-count { color: rgba(255,255,255,0.5); font-size: 0.9em; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .race-container { flex: 1; display: none; flex-direction: column; gap: 12px; padding: 10px 0; overflow-y: auto; }
  .race-container.active { display: flex; }

  .team-track {
    display: flex; align-items: center; gap: 15px; padding: 12px 20px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; transition: all 0.5s ease; position: relative; overflow: hidden;
  }

  .team-track.finished { border-color: rgba(0, 255, 136, 0.4); background: rgba(0, 255, 136, 0.05); }
  .team-track.first-place { border-color: rgba(255, 215, 0, 0.6); background: rgba(255, 215, 0, 0.08); box-shadow: 0 0 30px rgba(255, 215, 0, 0.15); }

  .team-rank { font-family: 'Orbitron', monospace; font-size: 1.8em; font-weight: 900; min-width: 50px; text-align: center; }
  .team-rank.gold { color: #ffd700; } .team-rank.silver { color: #c0c0c0; } .team-rank.bronze { color: #cd7f32; }

  .team-info { min-width: 180px; }
  .team-info .name { font-size: 1.3em; font-weight: 700; }
  .team-info .players { font-size: 0.8em; color: rgba(255,255,255,0.4); margin-top: 2px; }

  .progress-track { flex: 1; height: 40px; background: rgba(255,255,255,0.05); border-radius: 20px; position: relative; overflow: hidden; }

  .progress-fill {
    height: 100%; border-radius: 20px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative; display: flex; align-items: center; justify-content: flex-end;
    padding-right: 15px; min-width: 40px;
  }

  .progress-fill .runner { font-size: 1.5em; animation: bounce 0.6s infinite alternate; }
  @keyframes bounce { from { transform: translateY(-2px); } to { transform: translateY(2px); } }

  .puzzle-dots { display: flex; gap: 8px; align-items: center; }

  .puzzle-dot {
    width: 28px; height: 28px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 0.75em; font-weight: 700; transition: all 0.3s;
  }

  .puzzle-dot.solved { background: #00ff88; color: #0a0a1a; box-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
  .puzzle-dot.current { background: rgba(0, 170, 255, 0.3); border: 2px solid #00aaff; color: #00aaff; animation: currentPulse 1s infinite; }
  .puzzle-dot.locked { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.1); }

  @keyframes currentPulse { 0%, 100% { box-shadow: 0 0 5px rgba(0, 170, 255, 0.3); } 50% { box-shadow: 0 0 15px rgba(0, 170, 255, 0.6); } }

  .team-stats { text-align: right; min-width: 120px; }
  .team-stats .hints { font-size: 0.85em; color: rgba(255,255,255,0.4); }
  .team-stats .time { font-family: 'Orbitron', monospace; font-size: 1.1em; color: #00ff88; }

  .winner-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.85); z-index: 100; justify-content: center;
    align-items: center; flex-direction: column; animation: fadeIn 0.5s;
  }
  .winner-overlay.active { display: flex; }
  .winner-overlay .trophy { font-size: 8em; animation: trophyBounce 1s ease infinite; }
  @keyframes trophyBounce { 0%, 100% { transform: scale(1) rotate(-5deg); } 50% { transform: scale(1.1) rotate(5deg); } }
  .winner-overlay h2 { font-family: 'Orbitron', monospace; font-size: 3em; margin: 20px 0; background: linear-gradient(135deg, #ffd700, #ffaa00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .winner-overlay .win-time { font-size: 1.5em; color: rgba(255,255,255,0.7); }
  .winner-overlay .close-btn { margin-top: 30px; padding: 12px 40px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 30px; cursor: pointer; font-size: 1em; }

  .confetti-piece { position: fixed; width: 10px; height: 10px; z-index: 101; animation: confettiFall linear forwards; }
  @keyframes confettiFall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

  .controls { display: flex; justify-content: center; gap: 15px; padding: 10px 0; }
  .ctrl-btn { padding: 10px 25px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #fff; border-radius: 8px; cursor: pointer; font-size: 0.9em; transition: all 0.3s; }
  .ctrl-btn:hover { background: rgba(255,255,255,0.1); }
  .ctrl-btn.danger { border-color: rgba(255, 68, 68, 0.4); color: #ff4444; }

  .team-color-0 { --tc: #00ff88; } .team-color-1 { --tc: #00aaff; } .team-color-2 { --tc: #ff6b6b; }
  .team-color-3 { --tc: #ffd700; } .team-color-4 { --tc: #ff00ff; } .team-color-5 { --tc: #ff8800; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .particle { position: fixed; width: 4px; height: 4px; background: rgba(0, 255, 136, 0.3); border-radius: 50%; pointer-events: none; z-index: 0; animation: float 15s infinite linear; }
  @keyframes float { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
</style>
</head>
<body>
<div id="particles"></div>
<div class="container">
  <div class="header">
    <h1>🏦 FINANCE ESCAPE ROOM</h1>
    <div class="subtitle">SPS FP&A Edition</div>
  </div>
  <div class="timer-bar" id="timerBar" style="display:none;">
    <span style="font-size:1.2em;">⏱️</span>
    <div class="timer" id="timer">00:00</div>
  </div>
  <div class="lobby" id="lobby">
    <div class="join-info">
      <h2>📱 Waiting for Players</h2>
      <div class="team-count">
        <span id="teamCount">0</span> teams joined · <span id="playerCount">0</span> players ready
      </div>
    </div>
    <div class="lobby-teams" id="lobbyTeams"></div>
    <button class="start-btn" id="startBtn" disabled onclick="startGame()">⚡ START ESCAPE ⚡</button>
  </div>
  <div class="race-container" id="raceContainer">
    <div id="teamTracks"></div>
  </div>
  <div class="controls" id="controls" style="display:none;">
    <button class="ctrl-btn danger" onclick="resetGame()">🔄 Reset Game</button>
  </div>
</div>
<div class="winner-overlay" id="winnerOverlay">
  <div class="trophy">🏆</div>
  <h2 id="winnerName">Team Name</h2>
  <div class="win-time" id="winnerTime">Escaped in 0:00</div>
  <button class="close-btn" onclick="closeWinner()">Continue Watching</button>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let gameStarted = false;
  let startTime = null;
  let timerInterval = null;

  // Join URL removed from display

  const particlesDiv = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 15 + 's';
    p.style.animationDuration = (10 + Math.random() * 10) + 's';
    const colors = ['rgba(0,255,136,0.3)', 'rgba(0,170,255,0.3)', 'rgba(255,0,128,0.2)'];
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    particlesDiv.appendChild(p);
  }

  socket.on('teamsUpdate', (teams) => { updateLobby(teams); updateRaceTrack(teams); });

  socket.on('gameStarted', (data) => {
    gameStarted = true; startTime = data.startTime;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('raceContainer').classList.add('active');
    document.getElementById('timerBar').style.display = 'flex';
    document.getElementById('controls').style.display = 'flex';
    startTimer();
  });

  socket.on('firstFinisher', (data) => { showWinner(data.teamName, data.time); });

  socket.on('gameReset', () => {
    gameStarted = false; startTime = null; clearInterval(timerInterval);
    document.getElementById('lobby').style.display = 'flex';
    document.getElementById('raceContainer').classList.remove('active');
    document.getElementById('timerBar').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    document.getElementById('winnerOverlay').classList.remove('active');
    document.getElementById('teamTracks').innerHTML = '';
    document.getElementById('lobbyTeams').innerHTML = '';
    document.getElementById('teamCount').textContent = '0';
    document.getElementById('playerCount').textContent = '0';
    document.getElementById('startBtn').disabled = true;
  });

  function updateLobby(teams) {
    if (gameStarted) return;
    const container = document.getElementById('lobbyTeams');
    container.innerHTML = '';
    let totalPlayers = 0;
    teams.forEach((team, i) => {
      totalPlayers += team.playerCount;
      const card = document.createElement('div');
      card.className = `lobby-team-card team-color-${i % 6}`;
      card.style.borderColor = `var(--tc)`;
      card.innerHTML = `
        <div class="team-name" style="color: var(--tc)">${escapeHtml(team.name)}</div>
        <div class="player-count">${team.playerCount} player${team.playerCount !== 1 ? 's' : ''}</div>
        <div style="font-size:0.75em; color:rgba(255,255,255,0.3); margin-top:4px;">${team.players.map(p => escapeHtml(p)).join(', ')}</div>
      `;
      container.appendChild(card);
    });
    document.getElementById('teamCount').textContent = teams.length;
    document.getElementById('playerCount').textContent = totalPlayers;
    document.getElementById('startBtn').disabled = teams.length < 2;
  }

  function updateRaceTrack(teams) {
    if (!gameStarted) return;
    const container = document.getElementById('teamTracks');
    container.innerHTML = '';
    teams.forEach((team, index) => {
      const progress = (team.solvedCount / team.totalPuzzles) * 100;
      const colors = ['#00ff88', '#00aaff', '#ff6b6b', '#ffd700', '#ff00ff', '#ff8800'];
      const color = colors[index % colors.length];
      const emojis = ['🚀', '⚡', '🔥', '💎', '🌟', '🎯'];
      const emoji = emojis[index % emojis.length];
      let rankClass = '';
      if (index === 0) rankClass = 'gold'; else if (index === 1) rankClass = 'silver'; else if (index === 2) rankClass = 'bronze';
      const track = document.createElement('div');
      track.className = `team-track ${team.finished ? 'finished' : ''} ${index === 0 && team.finished ? 'first-place' : ''}`;
      let dotsHtml = '';
      for (let p = 1; p <= team.totalPuzzles; p++) {
        let dotClass = 'locked';
        if (team.solvedCount >= p) dotClass = 'solved'; else if (team.currentPuzzle === p) dotClass = 'current';
        dotsHtml += `<div class="puzzle-dot ${dotClass}">${team.solvedCount >= p ? '✓' : p}</div>`;
      }
      track.innerHTML = `
        <div class="team-rank ${rankClass}">#${index + 1}</div>
        <div class="team-info">
          <div class="name" style="color:${color}">${escapeHtml(team.name)}</div>
          <div class="players">${team.players.map(p => escapeHtml(p)).join(', ')}</div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
          <div class="progress-track">
            <div class="progress-fill" style="width:${Math.max(5, progress)}%; background: linear-gradient(90deg, ${color}44, ${color});">
              <span class="runner">${team.finished ? '🏆' : emoji}</span>
            </div>
          </div>
          <div class="puzzle-dots">${dotsHtml}</div>
        </div>
        <div class="team-stats">
          ${team.finished ? `<div class="time">${formatTime(team.finishTime)}</div>` : `<div style="color:${color}; font-size:1.1em;">Puzzle ${team.currentPuzzle}/${team.totalPuzzles}</div>`}
          <div class="hints">${team.hintsUsed > 0 ? `💡 ${team.hintsUsed} hints` : ''}</div>
        </div>
      `;
      container.appendChild(track);
    });
  }

  function startTimer() {
    const timerEl = document.getElementById('timer');
    timerInterval = setInterval(() => {
      const elapsed = Date.now() - startTime;
      timerEl.textContent = formatTime(elapsed);
      const seconds = elapsed / 1000;
      timerEl.className = 'timer';
      if (seconds > 600) timerEl.classList.add('danger'); else if (seconds > 300) timerEl.classList.add('warning');
    }, 100);
  }

  function formatTime(ms) {
    const totalSeconds = Math.floor(ms / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
  }

  function startGame() { socket.emit('startGame'); }

  function resetGame() {
    if (confirm('Are you sure you want to reset the game? All progress will be lost!')) socket.emit('resetGame');
  }

  function showWinner(teamName, time) {
    document.getElementById('winnerName').textContent = `🎉 ${teamName} ESCAPED! 🎉`;
    document.getElementById('winnerTime').textContent = `Escaped in ${formatTime(time)}`;
    document.getElementById('winnerOverlay').classList.add('active');
    launchConfetti();
  }

  function closeWinner() { document.getElementById('winnerOverlay').classList.remove('active'); }

  function launchConfetti() {
    const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffd700', '#ff6b6b'];
    for (let i = 0; i < 100; i++) {
      setTimeout(() => {
        const confetti = document.createElement('div');
        confetti.className = 'confetti-piece';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (2 + Math.random() * 3) + 's';
        confetti.style.width = (5 + Math.random() * 10) + 'px';
        confetti.style.height = (5 + Math.random() * 10) + 'px';
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 5000);
      }, i * 30);
    }
  }

  function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
</script>
</body>
</html>
